name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ubuntu-node-${{ hashFiles('package-lock.json') }}
          restore-keys: ubuntu-node-

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ubuntu-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: ubuntu-electron-

      - name: Install dependencies
        run: npm ci

      - name: Rebuild better-sqlite3 for system Node (unit tests)
        run: npm rebuild better-sqlite3

      - name: Run unit tests
        run: npm test

      - name: Rebuild better-sqlite3 for Electron (E2E tests)
        run: npx @electron/rebuild -f -o better-sqlite3

      - name: Build renderer
        run: npm run build:renderer

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: xvfb-run -a npm run test:e2e
